services:
  mycoffee:
    image: 'httpd'
    ports:
      - '80-85:80'
    volumes:
      - './indexes/coffee:/usr/local/apache2/htdocs'


  myecom:
    image: 'httpd'
    ports:
      - '90-95:80'
    volumes:
      - './indexes/ecom:/usr/local/apache2/htdocs'


  myclass:
    image: 'httpd'
    ports:
      - '8080-8085:80'
    volumes:
      - './indexes/class:/usr/local/apache2/htdocs'
