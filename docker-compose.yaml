services:
  mycoffee:
    image: 'httpd'
    ports:
      - '80-85:80'
    volumes:
      - './indexes/coffee:/usr/local/apache2/htdocs'
    networks:
      - 'myvelocity' 


  myecom:
    image: 'httpd'
    ports:
      - '90-95:80'
    volumes:
      - './indexes/ecom:/usr/local/apache2/htdocs'
    networks:
      - 'myvelocity'


  myclass:
    image: 'httpd'
    ports:
      - '8080-8085:80'
    volumes:
      - './indexes/class:/usr/local/apache2/htdocs'
    networks:
      - 'myvelocity'

  mytomcat:
    image: 'tomcat:10'
    ports:
      - '8090:8080'
    volumes:
      - './indexes/wars:/usr/local/tomcat/webapps/'
    networks:
      - 'myvelocity'


networks:
  myvelocity:
    driver: bridge
