<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEasy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #222;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da') no-repeat center/cover;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 30px;
      font-weight: bold;
    }

    .products {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #e65c00;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>ShopEasy 🛒</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  Big Sale - Up to 50% Off!
</section>

<section class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
    <h3>Smartphone</h3>
    <p class="price">₹15,999</p>
    <button onclick="addToCart('Smartphone')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
    <h3>Laptop</h3>
    <p class="price">₹55,999</p>
    <button onclick="addToCart('Laptop')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512499617640-c2f999098c01">
    <h3>Headphones</h3>
    <p class="price">₹2,999</p>
    <button onclick="addToCart('Headphones')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
    <h3>Smart Watch</h3>
    <p class="price">₹4,999</p>
    <button onclick="addToCart('Smart Watch')">Add to Cart</button>
  </div>

</section>

<footer>
  <p>© 2026 ShopEasy | All Rights Reserved</p>
</footer>

<script>
  function addToCart(product) {
    alert(product + " added to cart!");
  }
</script>

</body>
</html>
